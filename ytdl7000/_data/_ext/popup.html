<!doctype html>
<html>

    <head>
        <meta charset="utf-8">
        <title>Download video</title>
        <style>
            :root {
                color-scheme: dark;
                --bg: #202124;
                --panel: #292a2d;
                --panel-soft: #303134;
                --border: #3c4043;
                --text: #f1f3f4;
                --muted: #bdc1c6;
                --accent: #ff4046;
                --accent-hover: #ff565c;
                --accent-text: #ffffff;
                --focus: #8ab4f8;
            }

            * {
                box-sizing: border-box;
            }

            html,
            body {
                margin: 0;
                width: 520px;
                background: transparent;
                color: var(--text);
                font: 12px/1.3 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                overflow: hidden;
            }

            body {
                background: var(--bg);
            }

            .shell {
                width: 520px;
                display: flex;
                flex-direction: column;
                gap: 8px;
                padding: 10px;
                background: var(--bg);
            }

            .header {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 0 1px;
            }

            .header img {
                width: 24px;
                height: 24px;
            }

            h1 {
                margin: 0;
                font-size: 14px;
                font-weight: 600;
            }

            .lang-switch {
                display: inline-grid;
                grid-template-columns: 1fr 1fr;
                gap: 2px;
                margin-left: auto;
                padding: 2px;
                border: 1px solid var(--border);
                border-radius: 6px;
                background: var(--panel);
            }

            .lang-button {
                width: auto;
                min-width: 34px;
                min-height: 24px;
                padding: 0 7px;
                border: 0;
                border-radius: 4px;
                background: transparent;
                color: var(--muted);
                font: inherit;
                font-size: 11px;
                font-weight: 700;
                cursor: pointer;
            }

            .lang-button:hover {
                color: var(--text);
                background: var(--panel-soft);
            }

            .lang-button.active {
                color: var(--accent-text);
                background: var(--accent);
            }

            form {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            fieldset {
                display: grid;
                gap: 8px;
                margin: 0;
                padding: 8px;
                border: 1px solid var(--border);
                border-radius: 6px;
                background: var(--panel);
            }

            .primary-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
                column-gap: 10px;
            }

            .advanced-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
                column-gap: 10px;
            }

            .full-row {
                grid-column: 1 / -1;
            }

            .field {
                display: grid;
                gap: 4px;
            }

            .field-label {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                min-width: 0;
            }

            .field-label label {
                color: var(--muted);
            }

            .quality-control {
                display: grid;
                grid-template-columns: 118px 1fr;
                gap: 8px;
                align-items: end;
            }

            .quality-presets {
                display: grid;
                grid-template-columns: repeat(7, minmax(0, 1fr));
                gap: 4px;
            }

            .quality-preset {
                min-height: 30px;
                padding: 0 4px;
                border: 1px solid var(--border);
                border-radius: 5px;
                background: var(--panel-soft);
                color: var(--text);
                font: inherit;
                font-weight: 600;
                cursor: pointer;
            }

            .quality-preset:hover {
                border-color: var(--muted);
            }

            .quality-preset.active {
                border-color: var(--accent);
                background: rgba(255, 64, 70, 0.16);
                color: var(--accent-text);
            }

            .check {
                display: grid;
                grid-template-columns: 16px minmax(0, 1fr);
                align-items: center;
                gap: 7px;
                min-height: 24px;
                color: var(--text);
            }

            label {
                color: var(--muted);
                user-select: none;
            }

            .check label {
                color: var(--text);
            }

            .check-label {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                min-width: 0;
            }

            .info-icon {
                position: relative;
                width: 15px;
                height: 15px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                flex: 0 0 auto;
                color: var(--muted);
                cursor: help;
            }

            .info-icon svg {
                width: 15px;
                height: 15px;
                display: block;
                stroke: currentColor;
            }

            .info-icon::after {
                content: attr(data-tooltip);
                position: absolute;
                left: 50%;
                bottom: calc(100% + 7px);
                width: 220px;
                padding: 6px 8px;
                border: 1px solid var(--border);
                border-radius: 5px;
                background: #1b1b1d;
                color: var(--text);
                font-size: 11.5px;
                font-weight: 400;
                line-height: 1.35;
                white-space: normal;
                box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
                opacity: 0;
                pointer-events: none;
                transform: translate(-50%, 2px);
                transition: opacity 0.08s ease, transform 0.08s ease;
                z-index: 5;
            }

            .info-icon.tooltip-right::after {
                right: 0;
                left: auto;
                transform: translate(0, 2px);
            }

            .info-icon:hover::after,
            .info-icon:focus-visible::after {
                opacity: 1;
                transform: translate(-50%, 0);
            }

            .info-icon.tooltip-right:hover::after,
            .info-icon.tooltip-right:focus-visible::after {
                transform: translate(0, 0);
            }


            .info-icon:hover {
                color: var(--text);
            }

            input[type="number"],
            input[type="text"] {
                width: 100%;
                min-height: 30px;
                padding: 4px 8px;
                border: 1px solid var(--border);
                border-radius: 5px;
                outline: none;
                background: var(--panel-soft);
                color: var(--text);
                font: inherit;
            }

            input[type="number"]:focus,
            input[type="text"]:focus {
                border-color: var(--focus);
                box-shadow: 0 0 0 2px rgba(138, 180, 248, 0.2);
            }

            input[type="checkbox"] {
                width: 16px;
                height: 16px;
                margin: 0;
                accent-color: var(--accent);
            }

            button {
                width: 100%;
                min-height: 34px;
                border: 0;
                border-radius: 6px;
                background: var(--accent);
                color: var(--accent-text);
                font: inherit;
                font-weight: 600;
                cursor: pointer;
            }

            button:hover {
                background: var(--accent-hover);
            }

            button:focus-visible,
            .lang-button:focus-visible,
            .quality-preset:focus-visible {
                outline: 2px solid var(--focus);
                outline-offset: 2px;
            }
        </style>
    </head>

    <body>
        <div class="shell">
            <header class="header">
                <img src="icons/icon32.png" alt="">
                <h1 id="main_title">Download video</h1>
                <div class="lang-switch" aria-label="Language">
                    <button type="button" class="lang-button" data-lang="en">EN</button>
                    <button type="button" class="lang-button" data-lang="ru">RU</button>
                </div>
            </header>

            <form>
                <fieldset class="primary-grid">
                    <div class="field full-row">
                        <label for="maxQuality" id="maxQualityLabel">Max resolution:</label>
                        <div class="quality-control">
                            <input type="text" inputmode="numeric" pattern="[0-9]*" value="2160" id="maxQuality" name="maxQuality">
                            <div class="quality-presets" aria-label="Resolution presets">
                                <button type="button" class="quality-preset" data-quality="4320">8K</button>
                                <button type="button" class="quality-preset active" data-quality="2160">4K</button>
                                <button type="button" class="quality-preset" data-quality="1440">2K</button>
                                <button type="button" class="quality-preset" data-quality="1080">1080</button>
                                <button type="button" class="quality-preset" data-quality="720">720</button>
                                <button type="button" class="quality-preset" data-quality="480">480</button>
                                <button type="button" class="quality-preset" data-quality="360">360</button>
                            </div>
                        </div>
                    </div>

                    <div class="check">
                        <input type="checkbox" id="chooseSavedir" name="chooseSavedir">
                        <label for="chooseSavedir" id="chooseSavedirLabel">Choose save directory</label>
                    </div>

                    <div class="check">
                        <input type="checkbox" id="audioOnly" name="audioOnly">
                        <label for="audioOnly" id="audioOnlyLabel">Audio only</label>
                    </div>

                    <div class="check">
                        <input type="checkbox" id="loadFullPlaylist" name="loadFullPlaylist">
                        <label for="loadFullPlaylist" id="loadFullPlaylistLabel">Full playlist</label>
                    </div>
                </fieldset>

                <fieldset class="advanced-grid">
                    <div class="field">
                        <label for="restartAttempts" id="restartAttemptsLabel">Restart attempts:</label>
                        <input type="number" min="0" value="5" id="restartAttempts" name="restartAttempts">
                    </div>

                    <div class="field">
                        <label for="proxyParam" id="proxyParamLabel">Proxy:</label>
                        <input type="text" id="proxyParam" name="proxyParam">
                    </div>

                    <div class="field">
                        <span class="field-label">
                            <label for="playlistItems" id="playlistItemsLabel">Playlist videos:</label>
                            <span class="info-icon tooltip-right" id="playlistItemsInfo" role="img" aria-label="Info" tabindex="0">
                                <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                                    <circle cx="8" cy="8" r="6.25" fill="none" stroke-width="1.4"></circle>
                                    <circle cx="8" cy="5" r="0.7" fill="currentColor" stroke="none"></circle>
                                    <path d="M8 7.2v4" fill="none" stroke-width="1.4" stroke-linecap="round"></path>
                                </svg>
                            </span>
                        </span>
                        <input type="text" id="playlistItems" name="playlistItems" placeholder="1,3,5-10">
                    </div>

                    <div class="check">
                        <input type="checkbox" id="savePlaylistInExtraFolder" name="savePlaylistInExtraFolder">
                        <label for="savePlaylistInExtraFolder" id="savePlaylistInExtraFolderLabel">Playlist folder</label>
                    </div>

                    <div class="check">
                        <input type="checkbox" id="usePlaylistNumeration" name="usePlaylistNumeration">
                        <label for="usePlaylistNumeration" id="usePlaylistNumerationLabel">Numeration</label>
                    </div>

                    <div class="check">
                        <input type="checkbox" id="invertPlaylistNumeration" name="invertPlaylistNumeration">
                        <label for="invertPlaylistNumeration" id="invertPlaylistNumerationLabel">Reverse order</label>
                    </div>

                    <div class="check">
                        <input type="checkbox" id="skipErrors" name="skipErrors">
                        <label for="skipErrors" id="skipErrorsLabel">Skip errors</label>
                    </div>

                    <div class="check">
                        <input type="checkbox" id="useSponsorBlock" name="useSponsorBlock" checked>
                        <span class="check-label">
                            <label for="useSponsorBlock" id="useSponsorBlockLabel">Ad-free</label>
                            <span class="info-icon" id="useSponsorBlockInfo" role="img" aria-label="Info" tabindex="0">
                                <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                                    <circle cx="8" cy="8" r="6.25" fill="none" stroke-width="1.4"></circle>
                                    <circle cx="8" cy="5" r="0.7" fill="currentColor" stroke="none"></circle>
                                    <path d="M8 7.2v4" fill="none" stroke-width="1.4" stroke-linecap="round"></path>
                                </svg>
                            </span>
                        </span>
                    </div>

                    <div class="check">
                        <input type="checkbox" id="passCookies" name="passCookies">
                        <label for="passCookies" id="passCookiesLabel">Pass cookies</label>
                    </div>
                </fieldset>

                <button type="button" id="startDownload" name="startDownload">Start download</button>
            </form>
        </div>

        <script src="scripts.js" type="module"></script>
    </body>

</html>
